<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><%= metaTitle %></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --accent-blue: #63a2ff;
            --accent-blue-strong: #3f8cff;
            --success: #54cb6b;
            --danger: #ff6f6f;
            --text-primary: #f2f7ff;
            --text-secondary: #c3d1ea;

            --glass-bg: rgba(15, 24, 41, 0.46);
            --glass-bg-soft: rgba(21, 33, 55, 0.36);
            --glass-item: rgba(31, 47, 74, 0.36);
            --glass-item-hover: rgba(46, 67, 102, 0.46);
            --glass-border: rgba(255, 255, 255, 0.24);
            --glass-border-soft: rgba(255, 255, 255, 0.14);

            --radius-card: 24px;
            --radius-item: 16px;
            --shadow-card: 0 32px 72px rgba(4, 10, 22, 0.62);
            --blur-strong: blur(20px) saturate(135%);
            --blur-soft: blur(14px) saturate(125%);
        }

        html {
            background: #0b1322;
            min-height: 100%;
            overscroll-behavior-y: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Arial, sans-serif;
            color: var(--text-primary);
            background:
                radial-gradient(1200px 720px at 8% -5%, rgba(102, 170, 255, 0.24), transparent 58%),
                radial-gradient(900px 620px at 100% 102%, rgba(95, 145, 255, 0.22), transparent 62%),
                linear-gradient(170deg, #09101d 0%, #101d33 56%, #0c1627 100%);
            min-height: 100vh;
            padding: 18px 14px;
            font-size: 13px;
            overscroll-behavior-y: none;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(420px 210px at 22% 12%, rgba(255, 255, 255, 0.12), transparent 70%),
                radial-gradient(350px 220px at 84% 88%, rgba(181, 211, 255, 0.12), transparent 72%);
            mix-blend-mode: screen;
            opacity: 0.56;
        }

        .app {
            max-width: 1180px;
            margin: 0 auto;
        }

        .card {
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.02) 58%), var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            backdrop-filter: var(--blur-strong);
            -webkit-backdrop-filter: var(--blur-strong);
        }

        .header {
            padding: 18px 18px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
        }

        .header-title h1 {
            font-size: 22px;
            line-height: 1.2;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-shadow: 0 6px 20px rgba(115, 171, 255, 0.3);
        }

        .header-title p {
            margin-top: 6px;
            color: var(--text-secondary);
            font-size: 12px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 14px;
            align-items: start;
        }

        .sidebar,
        .main {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .profile-card,
        .content-card {
            padding: 16px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7eb9ff, #6ce8d3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 20px;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 10px 22px rgba(103, 175, 255, 0.34), inset 0 1px 1px rgba(255, 255, 255, 0.52);
        }

        .profile-name {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.2;
            word-break: break-word;
        }

        .status-badge {
            margin-top: 6px;
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid transparent;
            backdrop-filter: var(--blur-soft);
            -webkit-backdrop-filter: var(--blur-soft);
        }

        .status-active {
            background: rgba(84, 203, 107, 0.2);
            color: #d8ffe0;
            border-color: rgba(145, 255, 173, 0.56);
        }

        .status-expired,
        .status-disabled,
        .status-limited {
            background: rgba(255, 111, 111, 0.2);
            color: #ffd6d6;
            border-color: rgba(255, 154, 154, 0.58);
        }

        .profile-grid,
        .info-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        .info-row,
        .info-item {
            background: var(--glass-item);
            border: 1px solid var(--glass-border-soft);
            border-radius: var(--radius-item);
            padding: 12px;
            backdrop-filter: var(--blur-soft);
            -webkit-backdrop-filter: var(--blur-soft);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .info-label {
            color: var(--text-secondary);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .info-value {
            font-weight: 600;
            color: var(--text-primary);
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 3px;
            height: 20px;
            border-radius: 2px;
            background: linear-gradient(180deg, #99c4ff 0%, #61ead8 100%);
            box-shadow: 0 0 10px rgba(116, 188, 255, 0.34);
        }

        .settings-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .settings-group-title {
            font-size: 12px;
            color: var(--text-secondary);
            margin: 12px 0 8px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }


        .btn {
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: linear-gradient(150deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.03)), var(--glass-item);
            color: var(--text-primary);
            padding: 9px 12px;
            min-height: 38px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            backdrop-filter: var(--blur-soft);
            -webkit-backdrop-filter: var(--blur-soft);
        }

        .btn:focus,
        .btn:focus-visible {
            outline: none;
        }

        .btn:hover {
            border-color: rgba(159, 199, 255, 0.64);
            background: linear-gradient(150deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.05)), var(--glass-item-hover);
        }

        .btn-primary {
            background: linear-gradient(145deg, rgba(118, 175, 255, 0.92), rgba(77, 157, 255, 0.76));
            border-color: rgba(164, 208, 255, 0.9);
            color: #fff;
            box-shadow: 0 10px 22px rgba(80, 147, 255, 0.34), inset 0 1px 0 rgba(255, 255, 255, 0.42);
        }

        .btn-primary:hover {
            background: linear-gradient(145deg, rgba(130, 183, 255, 0.96), rgba(88, 164, 255, 0.82));
            border-color: rgba(186, 219, 255, 0.96);
        }

        .btn-icon {
            width: 38px;
            min-width: 38px;
            padding: 0;
        }

        .btn.is-active {
            background: linear-gradient(150deg, rgba(136, 186, 255, 0.95), rgba(78, 164, 255, 0.8));
            border-color: rgba(173, 214, 255, 0.94);
            color: #fff;
        }

        .profile-placeholder {
            color: var(--text-secondary);
        }

        #content {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            background: var(--glass-item);
            border: 1px solid var(--glass-border-soft);
            border-radius: var(--radius-item);
            padding: 10px;
            margin-bottom: 8px;
            backdrop-filter: var(--blur-soft);
            -webkit-backdrop-filter: var(--blur-soft);
        }

        .link-name {
            font-size: 11px;
            word-break: break-all;
            color: var(--text-primary);
            flex: 1;
        }

        .subscription-text {
            font-size: 14px;
            font-weight: 600;
        }

        .link-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .icon-action-btn {
            width: 44px;
            min-width: 44px;
            height: 44px;
            padding: 0;
        }

        .subscription-item {
            flex-direction: row;
            align-items: center;
        }

        .subscription-item .link-actions {
            width: auto;
        }

        .subscription-item .link-actions .btn {
            flex: 0 0 auto;
        }

        .server-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            background: var(--glass-item);
            border: 1px solid var(--glass-border-soft);
            border-radius: var(--radius-item);
            padding: 10px;
            margin-bottom: 8px;
            backdrop-filter: var(--blur-soft);
            -webkit-backdrop-filter: var(--blur-soft);
        }

        .server-left {
            min-width: 0;
            flex: 1;
        }

        .server-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            word-break: break-word;
        }

        .server-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .server-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #6b7280;
            box-shadow: 0 0 0 3px rgba(107, 114, 128, 0.16);
        }

        .server-status-dot.online {
            background: #67d04f;
            box-shadow: 0 0 0 3px rgba(103, 208, 79, 0.22);
        }

        .server-status-dot.offline {
            background: #ef5350;
            box-shadow: 0 0 0 3px rgba(239, 83, 80, 0.22);
        }

        .install-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .install-header .section-title {
            margin-bottom: 0;
            min-height: 0;
        }

        .install-toggle {
            min-width: 170px;
            justify-content: space-between;
            font-size: 13px;
        }

        .install-system-wrap {
            position: relative;
        }

        .system-menu {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            z-index: 20;
            min-width: 190px;
            display: none;
            flex-direction: column;
            gap: 6px;
            padding: 8px;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02)), var(--glass-bg);
            backdrop-filter: var(--blur-strong);
            -webkit-backdrop-filter: var(--blur-strong);
            box-shadow: var(--shadow-card);
        }

        .system-menu.is-open {
            display: flex;
        }

        .system-menu .btn {
            width: 100%;
            justify-content: flex-start;
        }

        .app-selector {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 10px;
        }

        .app-chip {
            width: 100%;
            justify-content: center;
            padding: 10px 12px;
            font-size: 13px;
            border-radius: 12px;
        }

        .guide-card {
            background: var(--glass-item);
            border: 1px solid var(--glass-border-soft);
            border-radius: var(--radius-item);
            padding: 14px;
            backdrop-filter: var(--blur-soft);
            -webkit-backdrop-filter: var(--blur-soft);
        }

        .guide-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .guide-step {
            padding: 12px;
            border: 1px solid var(--glass-border-soft);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 10px;
        }

        .guide-step:last-child {
            margin-bottom: 0;
        }

        .guide-step-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .guide-step-text {
            color: var(--text-secondary);
            line-height: 1.45;
            margin-bottom: 10px;
        }

        .guide-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        a,
        a:visited {
            color: inherit;
        }

        .btn-primary,
        .btn-primary:visited {
            color: #fff;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 18px;
            transform: translateX(-50%);
            background: linear-gradient(150deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.03)), rgba(24, 40, 63, 0.66);
            border: 1px solid rgba(35, 165, 90, 0.8);
            border-radius: 10px;
            color: #dcffe8;
            padding: 8px 14px;
            font-size: 11px;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1200;
            backdrop-filter: var(--blur-soft);
            -webkit-backdrop-filter: var(--blur-soft);
        }

        .toast.show {
            opacity: 1;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(6, 10, 18, 0.62);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 14px;
            z-index: 1100;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            width: min(500px, 100%);
            max-height: 90vh;
            overflow: auto;
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02)), rgba(17, 28, 44, 0.7);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            box-shadow: var(--shadow-card);
            backdrop-filter: var(--blur-strong);
            -webkit-backdrop-filter: var(--blur-strong);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 14px;
            border-bottom: 1px solid var(--glass-border-soft);
        }

        .modal-header h3 {
            font-size: 16px;
        }

        .modal-body {
            padding: 14px;
        }

        .modal-close-btn {
            width: 46px;
            min-width: 46px;
            min-height: 46px;
            font-size: 28px;
            line-height: 1;
            padding: 0;
        }

        .hidden-desktop {
            display: none;
        }

        body.theme-light {
            --accent-blue: #4688ff;
            --accent-blue-strong: #2f78f8;
            --text-primary: #1b2c47;
            --text-secondary: #577095;
            --glass-bg: rgba(255, 255, 255, 0.56);
            --glass-bg-soft: rgba(255, 255, 255, 0.48);
            --glass-item: rgba(255, 255, 255, 0.54);
            --glass-item-hover: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.82);
            --glass-border-soft: rgba(171, 196, 230, 0.6);
            --shadow-card: 0 24px 56px rgba(96, 122, 160, 0.24);
            color: var(--text-primary);
            background:
                radial-gradient(1200px 720px at 8% -5%, rgba(136, 186, 255, 0.3), transparent 58%),
                radial-gradient(900px 620px at 100% 102%, rgba(160, 198, 255, 0.2), transparent 62%),
                linear-gradient(170deg, #dce9fb 0%, #eaf1fd 56%, #dbe8fb 100%);
        }

        body.theme-light .status-active {
            background: rgba(84, 203, 107, 0.24);
            color: #102a18;
            border-color: rgba(84, 203, 107, 0.72);
        }

        body.theme-light .status-expired,
        body.theme-light .status-disabled,
        body.theme-light .status-limited {
            color: #4a1f1f;
            border-color: rgba(255, 111, 111, 0.56);
        }

        body.theme-light .modal-content {
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.78));
            border-color: rgba(188, 210, 240, 0.92);
        }

        body.theme-light .modal-header {
            border-bottom-color: rgba(188, 210, 240, 0.88);
        }

        body.theme-light .modal-header h3 {
            color: #1b2c47;
        }

        body.theme-light .settings-group-title {
            color: #4f678a;
        }

        body.theme-light .guide-card {
            background: rgba(255, 255, 255, 0.62);
            border-color: rgba(171, 196, 230, 0.7);
        }

        body.theme-light .guide-step {
            background: rgba(255, 255, 255, 0.52);
            border-color: rgba(171, 196, 230, 0.7);
        }

        body.theme-light .btn {
            border-color: var(--glass-border-soft);
        }

        body.theme-light .system-menu {
            border-color: rgba(188, 210, 240, 0.92);
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.78));
        }

        @media (max-width: 920px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }

            .hidden-desktop {
                display: inline-flex;
            }

            .install-header {
                flex-direction: row;
                align-items: center;
            }

            .install-toggle {
                width: auto;
            }

            .app-selector {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .link-item {
                flex-direction: column;
                align-items: stretch;
            }

            .link-actions {
                width: 100%;
            }

            .link-actions .btn {
                flex: 1;
            }

            .header-actions [data-action="open-settings"] {
                order: 1;
            }

            .header-actions [data-action="open-profile"] {
                order: 2;
            }

            .header-actions [data-action="open-tg"] {
                order: 3;
            }

            .subscription-item {
                flex-direction: row;
                align-items: center;
            }

            .subscription-item .link-actions {
                width: auto;
            }

            .subscription-item .link-actions .btn {
                flex: 0 0 auto;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header card">
            <div class="header-title">
                <h1><%= metaTitle %></h1>
                <p><%= metaDescription %></p>
            </div>
            <div class="header-actions">
                <button class="btn btn-icon" type="button" data-action="open-settings" title="Настройки">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06A2 2 0 1 1 7.07 3.2l.06.06a1.7 1.7 0 0 0 1.87.34h.03a1.7 1.7 0 0 0 1-1.55V2a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06A2 2 0 1 1 20.8 7.07l-.06.06a1.7 1.7 0 0 0-.34 1.87v.03a1.7 1.7 0 0 0 1.55 1H22a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/></svg>
                </button>
                <button class="btn btn-icon" type="button" data-action="open-tg" title="Telegram">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7Z"/></svg>
                </button>
                <button class="btn btn-icon hidden-desktop" type="button" data-action="open-profile" title="Профиль">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>
                </button>
            </div>
        </div>

        <div class="layout">
            <aside class="sidebar">
                <div class="card profile-card" id="profileCard"></div>
            </aside>

            <main class="main">
                <div id="content"></div>
            </main>
        </div>
    </div>

        <div class="modal" id="profileModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="profileModalTitle">Профиль</h3>
                    <button class="btn btn-icon modal-close-btn" type="button" data-action="close-modal" data-modal="profileModal">×</button>
                </div>
                <div class="modal-body" id="profileModalBody"></div>
            </div>
    </div>

        <div class="modal" id="settingsModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="settingsModalTitle">Настройки</h3>
                    <button class="btn btn-icon modal-close-btn" type="button" data-action="close-modal" data-modal="settingsModal">×</button>
                </div>
                <div class="modal-body">
                <div class="settings-group-title" id="themeLabel">Тема</div>
                <div class="settings-row" id="settingsButtonsMobile">
                    <button class="btn" type="button" data-action="theme" data-theme="dark" id="themeDarkBtn">Тёмная</button>
                    <button class="btn" type="button" data-action="theme" data-theme="light" id="themeLightBtn">Светлая</button>
                    <button class="btn" type="button" data-action="theme" data-theme="auto" id="themeAutoBtn">Авто</button>
                </div>
                <div class="settings-group-title" id="languageLabel">Язык</div>
                <div class="settings-row">
                    <button class="btn" type="button" data-action="lang" data-lang="ru">Русский</button>
                    <button class="btn" type="button" data-action="lang" data-lang="en">English</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const panelDataB64 = '<%= panelData %>';
        let panelData;

        try {
            panelData = JSON.parse(atob(panelDataB64));
        } catch (error) {
            console.error('Error loading data:', error);
            panelData = { response: { isFound: false } };
        }

        const i18n = {
            ru: {
                copied: 'Скопировано',
                copyError: 'Ошибка копирования',
                profile: 'Профиль',
                settings: 'Настройки',
                theme: 'Тема',
                language: 'Язык',
                dark: 'Тёмная',
                light: 'Светлая',
                auto: 'Авто',
                active: 'Активен',
                inactive: 'Неактивен',
                expires: 'Истекает',
                trafficUsed: 'Трафик использован',
                trafficLimit: 'Лимит трафика',
                unlimited: 'Без лимита',
                indefinitely: 'Бесконечно',
                user: 'Пользователь',
                install: 'Установка',
                downloadStep: '1. Скачать приложение',
                downloadText: 'Установите приложение.',
                downloadBtn: 'Скачать',
                addStep: '2. Добавить подписку',
                addBtn: 'Добавить подписку',
                copyBtn: 'Скопировать ссылку',
                noData: 'Данные не найдены',
                userNotFound: 'Данные пользователя не найдены',
                subscriptionUrl: 'URL подписки',
                serversList: 'Список серверов',
                ssConfig: 'Shadowsocks конфигурации'
            },
            en: {
                copied: 'Copied',
                copyError: 'Copy failed',
                profile: 'Profile',
                settings: 'Settings',
                theme: 'Theme',
                language: 'Language',
                dark: 'Dark',
                light: 'Light',
                auto: 'Auto',
                active: 'Active',
                inactive: 'Inactive',
                expires: 'Expires',
                trafficUsed: 'Traffic used',
                trafficLimit: 'Traffic limit',
                unlimited: 'Unlimited',
                indefinitely: 'Forever',
                user: 'User',
                install: 'Installation',
                downloadStep: '1. Install app',
                downloadText: 'Install the app.',
                downloadBtn: 'Download',
                addStep: '2. Add subscription',
                addBtn: 'Add subscription',
                copyBtn: 'Copy link',
                noData: 'No data found',
                userNotFound: 'User data not found',
                subscriptionUrl: 'Subscription URL',
                serversList: 'Server list',
                ssConfig: 'Shadowsocks configs'
            }
        };

        let currentLanguage = localStorage.getItem('lang')
            || ((navigator.language || '').toLowerCase().startsWith('en') ? 'en' : 'ru');
        if (!i18n[currentLanguage]) currentLanguage = 'ru';

        function t(key) {
            return (i18n[currentLanguage] && i18n[currentLanguage][key]) || i18n.ru[key] || key;
        }

        const appsConfig = {
            ios: [
                {
                    id: 'v2raytun',
                    name: 'V2RayTun',
                    install: 'https://apps.apple.com/us/app/v2raytun/id6476628951?l=ru',
                    scheme: 'v2raytun://import/',
                    addDescription: { ru: 'Нажмите «Добавить подписку» или скопируйте и вставьте вручную.', en: 'Press “Add subscription” or copy and paste manually.' }
                }
            ],
            android: [
                {
                    id: 'v2raytun',
                    name: 'V2RayTun',
                    install: 'https://play.google.com/store/search?q=v2raytun&c=apps',
                    scheme: 'v2raytun://import/',
                    addDescription: { ru: 'Нажмите «Добавить подписку» или скопируйте и вставьте вручную.', en: 'Press “Add subscription” or copy and paste manually.' }
                }
            ],
            windows: [
                {
                    id: 'happ',
                    name: 'Happ',
                    install: 'https://github.com/Happ-proxy/happ-desktop/releases/latest',
                    scheme: 'happ://add/',
                    addDescription: { ru: 'Нажмите «Добавить подписку» или скопируйте и вставьте вручную.', en: 'Press “Add subscription” or copy and paste manually.' }
                },
                {
                    id: 'nekoray',
                    name: 'NekoRay',
                    install: 'https://github.com/MatsuriDayo/nekoray/releases',
                    manualGuide: { ru: '1. Включите TUN mode\n2. Правой кнопкой мыши по пустому полю → «Вставить из буфера обмена» → в окне групп выберите «Добавить в новую группу».', en: '1. Enable TUN mode\n2. Right-click an empty area → “Paste from clipboard” → in groups window choose “Add to new group”.' }
                }
            ],
            macos: [
                {
                    id: 'happ',
                    name: 'Happ',
                    install: 'https://apps.apple.com/ru/app/happ-proxy-utility-plus/id6746188973',
                    scheme: 'happ://add/',
                    addDescription: { ru: 'Нажмите «Добавить подписку» или скопируйте и вставьте вручную.', en: 'Press “Add subscription” or copy and paste manually.' }
                },
                {
                    id: 'nekoray',
                    name: 'NekoRay',
                    install: 'https://github.com/MatsuriDayo/nekoray/releases',
                    manualGuide: { ru: '1. Включите TUN mode\n2. Правой кнопкой мыши по пустому полю → «Вставить из буфера обмена» → в окне групп выберите «Добавить в новую группу».', en: '1. Enable TUN mode\n2. Right-click an empty area → “Paste from clipboard” → in groups window choose “Add to new group”.' }
                }
            ],
            linux: [
                {
                    id: 'happ',
                    name: 'Happ',
                    install: 'https://github.com/Happ-proxy/happ-desktop/releases/latest',
                    scheme: 'happ://add/',
                    addDescription: { ru: 'Нажмите «Добавить подписку» или скопируйте и вставьте вручную.', en: 'Press “Add subscription” or copy and paste manually.' }
                },
                {
                    id: 'nekoray',
                    name: 'NekoRay',
                    install: 'https://github.com/MatsuriDayo/nekoray/releases',
                    manualGuide: { ru: '1. Включите TUN mode\n2. Правой кнопкой мыши по пустому полю → «Вставить из буфера обмена» → в окне групп выберите «Добавить в новую группу».', en: '1. Enable TUN mode\n2. Right-click an empty area → “Paste from clipboard” → in groups window choose “Add to new group”.' }
                }
            ],
            androidtv: [
                {
                    id: 'happ',
                    name: 'Happ',
                    install: 'https://play.google.com/store/apps/details?id=com.happproxy',
                    scheme: 'happ://add/',
                    addDescription: { ru: 'Нажмите «Добавить подписку» или скопируйте и вставьте вручную.', en: 'Press “Add subscription” or copy and paste manually.' }
                }
            ],
            appletv: [
                {
                    id: 'happ',
                    name: 'Happ',
                    install: 'https://apps.apple.com/us/app/happ-proxy-utility-for-tv/id6748297274',
                    scheme: 'happ://add/',
                    addDescription: { ru: 'Нажмите «Добавить подписку» или скопируйте и вставьте вручную.', en: 'Press “Add subscription” or copy and paste manually.' }
                }
            ]
        };

        const platformOrder = ['ios', 'android', 'windows', 'macos', 'linux', 'androidtv', 'appletv'];
        const platformNames = {
            ios: 'iOS',
            android: 'Android',
            windows: 'Windows',
            macos: 'macOS',
            linux: 'Linux',
            androidtv: 'Android TV',
            appletv: 'Apple TV'
        };

        function detectPlatform() {
            const ua = navigator.userAgent || '';
            if (/AppleTV/i.test(ua)) return 'appletv';
            if (/iPhone|iPad|iPod/i.test(ua)) return 'ios';
            if (/Android/i.test(ua)) {
                if (/TV|AFT|BRAVIA|GoogleTV|MiTV/i.test(ua)) return 'androidtv';
                return 'android';
            }
            if (/Windows/i.test(ua)) return 'windows';
            if (/Macintosh|Mac OS X/i.test(ua)) return 'macos';
            if (/Linux/i.test(ua)) return 'linux';
            return 'android';
        }

        let currentPlatform = detectPlatform();
        if (!appsConfig[currentPlatform]) currentPlatform = 'android';
        let systemMenuOpen = false;
        const selectedAppByPlatform = {};

        function formatBytes(bytes) {
            if (bytes === '0') return '0';
            const num = parseInt(bytes, 10);
            if (Number.isNaN(num)) return '0 B';
            if (num >= 1099511627776) return (num / 1099511627776).toFixed(2) + ' TB';
            if (num >= 1073741824) return (num / 1073741824).toFixed(2) + ' GB';
            if (num >= 1048576) return (num / 1048576).toFixed(2) + ' MB';
            if (num >= 1024) return (num / 1024).toFixed(2) + ' KB';
            return num + ' B';
        }

        function escapeHtml(text) {
            if (typeof text !== 'string') return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function encodeData(text) {
            if (typeof text !== 'string') return '';
            return encodeURIComponent(text);
        }

        function decodeData(text) {
            try {
                return decodeURIComponent(text || '');
            } catch {
                return '';
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1800);
        }

        function copyText(text) {
            navigator.clipboard.writeText(text)
                .then(() => showToast(t('copied')))
                .catch(() => showToast(t('copyError')));
        }

        function extractLinkName(link) {
            try {
                const url = new URL(link);
                const hash = url.hash.substring(1);
                return decodeURIComponent(hash) || url.protocol.replace(':', '').toUpperCase();
            } catch {
                return link.split('://')[0]?.toUpperCase() || 'Ключ';
            }
        }

        function openModal(id) {
            const modal = document.getElementById(id);
            if (modal) modal.classList.add('active');
        }

        function closeModal(id) {
            const modal = document.getElementById(id);
            if (modal) modal.classList.remove('active');
        }

        function applyTheme(theme) {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const resolved = theme === 'auto' ? (prefersDark ? 'dark' : 'light') : (theme === 'light' ? 'light' : 'dark');

            document.body.classList.toggle('theme-light', resolved === 'light');
            document.documentElement.style.background = resolved === 'light' ? '#edf3ff' : '#0b1018';
            localStorage.setItem('theme', theme);

            document.querySelectorAll('[data-action="theme"]').forEach(btn => {
                btn.classList.toggle('is-active', btn.dataset.theme === theme);
            });
        }

        function applyLanguage(lang) {
            currentLanguage = i18n[lang] ? lang : 'ru';
            localStorage.setItem('lang', currentLanguage);
            document.documentElement.setAttribute('lang', currentLanguage);

            const profileModalTitle = document.getElementById('profileModalTitle');
            const settingsModalTitle = document.getElementById('settingsModalTitle');
            const themeLabel = document.getElementById('themeLabel');
            const languageLabel = document.getElementById('languageLabel');
            const themeDarkBtn = document.getElementById('themeDarkBtn');
            const themeLightBtn = document.getElementById('themeLightBtn');
            const themeAutoBtn = document.getElementById('themeAutoBtn');

            if (profileModalTitle) profileModalTitle.textContent = t('profile');
            if (settingsModalTitle) settingsModalTitle.textContent = t('settings');
            if (themeLabel) themeLabel.textContent = t('theme');
            if (languageLabel) languageLabel.textContent = t('language');
            if (themeDarkBtn) themeDarkBtn.textContent = t('dark');
            if (themeLightBtn) themeLightBtn.textContent = t('light');
            if (themeAutoBtn) themeAutoBtn.textContent = t('auto');

            document.querySelectorAll('[data-action="lang"]').forEach(btn => {
                btn.classList.toggle('is-active', btn.dataset.lang === currentLanguage);
            });

            renderContent();
        }

        function renderProfile(user) {
            const statusClass = user.userStatus === 'ACTIVE' ? 'status-active' : 'status-expired';
            const statusText = user.userStatus === 'ACTIVE' ? t('active') : t('inactive');
            const avatarLetter = (user.username || t('user')).charAt(0).toUpperCase();

            const expiresDate = new Date(user.expiresAt);
            const isNeverExpires = expiresDate.getFullYear() >= 2099;
            const expiryText = isNeverExpires ? t('indefinitely') : expiresDate.toLocaleDateString(currentLanguage === 'en' ? 'en-US' : 'ru-RU');

            const profileHtml = `
                <div class="profile-header">
                    <div class="avatar">${escapeHtml(avatarLetter)}</div>
                    <div>
                        <div class="profile-name">${escapeHtml(user.username || t('user'))}</div>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    </div>
                </div>
                <div class="profile-grid">
                    <div class="info-row">
                        <span class="info-label">${t('expires')}</span>
                        <span class="info-value">${expiryText}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">${t('trafficUsed')}</span>
                        <span class="info-value">${escapeHtml(String(user.trafficUsed || '0'))}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">${t('trafficLimit')}</span>
                        <span class="info-value">${user.trafficLimit === '0' ? t('unlimited') : escapeHtml(String(user.trafficLimit || '0'))}</span>
                    </div>
                </div>
            `;

            document.getElementById('profileCard').innerHTML = profileHtml;
            document.getElementById('profileModalBody').innerHTML = profileHtml;
        }

        function renderApps(subscriptionUrl) {
            const apps = appsConfig[currentPlatform] || [];
            if (!apps.length) return '';
            const selectedAppId = selectedAppByPlatform[currentPlatform] || apps[0].id;
            const selectedApp = apps.find(app => app.id === selectedAppId) || apps[0];
            selectedAppByPlatform[currentPlatform] = selectedApp.id;

            const deviceButtons = platformOrder
                .filter(platform => Array.isArray(appsConfig[platform]) && appsConfig[platform].length > 0)
                .map(platform => `
                    <button type="button" class="btn ${platform === currentPlatform ? 'is-active' : ''}" data-action="switch-device" data-platform="${platform}">
                        ${platformNames[platform]}
                    </button>
                `)
                .join('');

            const encodedSubscription = encodeData(subscriptionUrl);
            const appButtons = apps.map(app => `
                <button type="button" class="btn app-chip ${app.id === selectedApp.id ? 'is-active' : ''}" data-action="switch-app" data-app-id="${app.id}">
                    ${escapeHtml(app.name)}
                </button>
            `).join('');

            const autoAddAction = selectedApp.scheme
                ? `<a href="${selectedApp.scheme}${encodeURIComponent(subscriptionUrl)}" class="btn btn-primary">${t('addBtn')}</a>`
                : '';
            const addDescription = selectedApp.manualGuide
                ? escapeHtml(typeof selectedApp.manualGuide === 'object' ? (selectedApp.manualGuide[currentLanguage] || selectedApp.manualGuide.ru || '') : selectedApp.manualGuide).replace(/\n/g, '<br>')
                : escapeHtml(
                    typeof selectedApp.addDescription === 'object'
                        ? (selectedApp.addDescription[currentLanguage] || selectedApp.addDescription.ru || '')
                        : (selectedApp.addDescription || '')
                ).replace(/\n/g, '<br>');

            const guideCard = `
                <div class="guide-card">
                    <div class="guide-title">${escapeHtml(selectedApp.name)}</div>
                    <div class="guide-step">
                        <div class="guide-step-title">${t('downloadStep')}</div>
                        <div class="guide-step-text">${t('downloadText')}</div>
                        <div class="guide-actions">
                            <a href="${selectedApp.install}" target="_blank" rel="noopener noreferrer" class="btn">${t('downloadBtn')}</a>
                        </div>
                    </div>
                    <div class="guide-step">
                        <div class="guide-step-title">${t('addStep')}</div>
                        <div class="guide-step-text">${addDescription}</div>
                        <div class="guide-actions">
                            ${autoAddAction}
                            <button class="btn" type="button" data-action="copy" data-value="${encodedSubscription}">${t('copyBtn')}</button>
                        </div>
                    </div>
                </div>
            `;

            return `
                <div class="card content-card">
                    <div class="install-header">
                        <div class="section-title">${t('install')}</div>
                        <div class="install-system-wrap">
                            <button type="button" class="btn install-toggle" data-action="toggle-system-menu">
                                <span>${platformNames[currentPlatform]}</span>
                                <span>${systemMenuOpen ? '▴' : '▾'}</span>
                            </button>
                            <div class="system-menu ${systemMenuOpen ? 'is-open' : ''}">
                                ${deviceButtons}
                            </div>
                        </div>
                    </div>
                    <div class="app-selector">
                        ${appButtons}
                    </div>
                    ${guideCard}
                </div>
            `;
        }

        function renderContent() {
            const content = document.getElementById('content');
            const response = panelData?.response;

            if (!response || !response.isFound) {
                document.getElementById('profileCard').innerHTML = `<div class="profile-placeholder">${t('userNotFound')}</div>`;
                document.getElementById('profileModalBody').innerHTML = `<div class="profile-placeholder">${t('userNotFound')}</div>`;
                content.innerHTML = `<div class="card content-card">${t('noData')}</div>`;
                return;
            }

            const { user, links = [], subscriptionUrl = '', ssConfLinks } = response;
            renderProfile(user);

            content.innerHTML = `
                <div class="card content-card">
                    <div class="section-title">${t('subscriptionUrl')}</div>
                    <div class="link-item subscription-item">
                        <div class="link-name subscription-text">${escapeHtml(subscriptionUrl)}</div>
                        <div class="link-actions">
                            <button class="btn icon-action-btn" type="button" data-action="copy" data-value="${encodeData(subscriptionUrl)}" title="${t('copyBtn')}">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="9" y="9" width="11" height="11" rx="2"></rect>
                                    <rect x="4" y="4" width="11" height="11" rx="2"></rect>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                ${renderApps(subscriptionUrl)}

                <div class="card content-card">
                    <div class="section-title">${t('serversList')} (${links.length})</div>
                    ${links.map(link => `
                        <div class="server-item">
                            <div class="server-left">
                                <div class="server-name">${escapeHtml(extractLinkName(link))}</div>
                            </div>
                            <div class="server-right">
                                <span class="server-status-dot ${user.userStatus === 'ACTIVE' ? 'online' : 'offline'}"></span>
                                <button class="btn icon-action-btn" type="button" data-action="copy" data-value="${encodeData(link)}" title="${t('copyBtn')}">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="9" y="9" width="11" height="11" rx="2"></rect>
                                        <rect x="4" y="4" width="11" height="11" rx="2"></rect>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>

                ${Object.keys(ssConfLinks || {}).length > 0 ? `
                <div class="card content-card">
                    <div class="section-title">${t('ssConfig')}</div>
                    ${Object.entries(ssConfLinks).map(([key, value]) => `
                        <div class="link-item">
                            <div class="link-name">${escapeHtml(key)}</div>
                            <div class="link-actions">
                                <button class="btn icon-action-btn" type="button" data-action="copy" data-value="${encodeData(value)}" title="${t('copyBtn')}">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="9" y="9" width="11" height="11" rx="2"></rect>
                                        <rect x="4" y="4" width="11" height="11" rx="2"></rect>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
                ` : ''}
            `;
        }

        document.addEventListener('click', (e) => {
            const el = e.target.closest('[data-action]');
            if (!el) return;

            const action = el.dataset.action;

            if (action === 'copy') {
                copyText(decodeData(el.dataset.value));
                return;
            }

            if (action === 'switch-device') {
                currentPlatform = el.dataset.platform;
                systemMenuOpen = false;
                renderContent();
                return;
            }

            if (action === 'switch-app') {
                selectedAppByPlatform[currentPlatform] = el.dataset.appId;
                renderContent();
                return;
            }

            if (action === 'toggle-system-menu') {
                systemMenuOpen = !systemMenuOpen;
                renderContent();
                return;
            }

            if (action === 'theme') {
                applyTheme(el.dataset.theme);
                return;
            }

            if (action === 'lang') {
                applyLanguage(el.dataset.lang);
                return;
            }

            if (action === 'open-profile') {
                openModal('profileModal');
                return;
            }

            if (action === 'open-settings') {
                openModal('settingsModal');
                return;
            }

            if (action === 'open-tg') {
                window.location.href = 'https://t.me/your_username';
                return;
            }

            if (action === 'close-modal') {
                closeModal(el.dataset.modal);
            }
        });

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal.active').forEach(modal => modal.classList.remove('active'));
            }
        });

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if ((localStorage.getItem('theme') || 'auto') === 'auto') {
                applyTheme('auto');
            }
        });

        applyTheme(localStorage.getItem('theme') || 'auto');
        applyLanguage(localStorage.getItem('lang') || currentLanguage);
    </script>
</body>
</html>
